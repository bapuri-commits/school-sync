semester: "2026-1"
request_delay: 0.5
request_timeout: 30.0

sites:
  eclass:
    base_url: "https://eclass.dongguk.edu"
    enabled: true
    global_board_ids: [31, 32, 33]
    min_download_size_bytes: 512
  portal:
    base_url: "https://www.dongguk.edu"
    enabled: true
    schedule_info_seq: 22
  department:
    base_url: "https://ai.dongguk.edu"
    enabled: true
    boards:
      - key: "notices"
        path: "notice"
        label: "학과공지"
      - key: "external_notices"
        path: "notice2"
        label: "특강/공모전/취업"
      - key: "college_data"
        path: "collegedata"
        label: "학사자료"
  ndrims:
    base_url: "https://ndrims.dongguk.edu"
    enabled: true

output_dir: "output"
