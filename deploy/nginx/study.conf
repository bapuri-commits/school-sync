# --- StudyHub ---
server {
    listen 443 ssl http2;
    server_name study.syworkspace.cloud;

    ssl_certificate     /etc/letsencrypt/live/syworkspace.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/syworkspace.cloud/privkey.pem;

    include /etc/nginx/snippets/security-headers.conf;

    location / {
        proxy_pass http://127.0.0.1:8203;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 스트리밍 지원
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}

server {
    listen 80;
    server_name study.syworkspace.cloud;
    return 301 https://$host$request_uri;
}
