services:
  study:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: study
    ports:
      - "8203:8000"
    volumes:
      - ${DATA_DIR:-../data}/output:/app/output
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
