services:
  study:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: study
    ports:
      - "8203:8000"
    volumes:
      - ${DATA_DIR:-../data}/output:/app/output
      - /opt/apps/lesson-assist:/lesson-assist
      - ${DATA_DIR:-../data}/lesson-assist:/data/lesson-assist
      - ${GDRIVE_SERVICE_ACCOUNT_PATH:-/opt/envs/gdrive-service-account.json}:/secrets/gdrive.json:ro
    environment:
      GDRIVE_SERVICE_ACCOUNT_PATH: /secrets/gdrive.json
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
