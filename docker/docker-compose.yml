services:
  study:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: study
    ports:
      - "8203:8000"
    volumes:
      - ${DATA_DIR:-../data}/output:/app/output
      - /opt/apps/lesson-assist:/lesson-assist
      - ${DATA_DIR:-../data}/lesson-assist:/data/lesson-assist
      - /opt/envs/gdrive-token.json:/secrets/gdrive-token.json
    environment:
      GDRIVE_TOKEN_PATH: /secrets/gdrive-token.json
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s
